<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meca PC - 관리자 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #f8fafc; }
        .admin-card { background: #0f172a; border: 1px solid #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SUPABASE_URL = 'https://sslxmhgpygsjisuxqmjb.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_fb7TduQr58DH6C1n7WNlIw_OrH-sbZV';

        const App = () => {
            const [supabase, setSupabase] = useState(null);
            const [rooms, setRooms] = useState([]);
            const [waitingList, setWaitingList] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                setSupabase(client);
            }, []);

            useEffect(() => {
                if (!supabase) return;
                const fetchData = async () => {
                    const { data: r } = await supabase.from('rooms').select('*').order('room_no', { ascending: true });
                    const { data: w } = await supabase.from('waiting').select('*').eq('status', 'WAITING').order('created_at', { ascending: true });
                    setRooms(r || []);
                    setWaitingList(w || []);
                    setLoading(false);
                };
                fetchData();
                const channel = supabase.channel('admin-realtime').on('postgres_changes', { event: '*', schema: 'public', table: '*' }, fetchData).subscribe();
                return () => supabase.removeChannel(channel);
            }, [supabase]);

            const toggleRoom = async (id, status) => {
                await supabase.from('rooms').update({ status: status === 'EMPTY' ? 'OCCUPIED' : 'EMPTY' }).eq('id', id);
            };

            const complete = async (id) => {
                await supabase.from('waiting').update({ status: 'DONE' }).eq('id', id);
            };

            const cancel = async (id) => {
                if(window.confirm('정말로 이 손님의 대기를 취소 처리하시겠습니까?')) {
                    await supabase.from('waiting').update({ status: 'CANCELED' }).eq('id', id);
                }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center text-blue-500 font-black animate-pulse">실시간 동기화 중...</div>;

            return (
                <main className="max-w-[95%] mx-auto p-6 min-h-screen flex flex-col gap-6 animate-in fade-in pb-20">
                    <header className="flex-none flex justify-between items-center bg-slate-900/50 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                        <div>
                            <h1 className="text-3xl font-black text-blue-500 tracking-tighter italic">Meca PC 카운터 대시보드</h1>
                            <p className="text-slate-500 text-xs font-bold tracking-widest mt-1">실시간 매장 관리</p>
                        </div>
                        <div className="bg-blue-600 px-8 py-3 flex items-center gap-6 rounded-2xl shadow-lg shadow-blue-600/20 text-center">
                            <span className="block text-sm text-blue-200 font-black tracking-widest">현재 전체 대기</span>
                            <span className="text-4xl font-black text-white">{waitingList.length}팀</span>
                        </div>
                    </header>

                    <div className="flex-1 grid grid-cols-1 xl:grid-cols-3 gap-6 items-start">
                        {[3, 4, 5].map(capacity => {
                            const capacityRooms = rooms.filter(r => r.capacity === capacity);
                            const capacityWaiting = waitingList.filter(w => w.party_size === capacity);
                            const emptyCount = capacityRooms.filter(r => r.status === 'EMPTY').length;

                            return (
                                <section key={capacity} className="flex flex-col bg-slate-900/40 border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-xl h-fit">
                                    <div className="bg-slate-800/80 p-6 flex justify-between items-center flex-none">
                                        <h2 className="text-2xl font-black text-white tracking-widest italic">{capacity}인실</h2>
                                        <div className="flex gap-2">
                                            <span className="px-5 py-2 bg-green-500/10 text-green-400 rounded-full text-sm font-black tracking-widest">빈방 {emptyCount}개</span>
                                            <span className="px-5 py-2 bg-blue-500/10 text-blue-400 rounded-full text-sm font-black tracking-widest">대기 {capacityWaiting.length}팀</span>
                                        </div>
                                    </div>
                                    
                                    <div className="p-6 flex-none border-b border-slate-800/50">
                                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-3">
                                            {capacityRooms.map(r => (
                                                <button key={r.id} onClick={() => toggleRoom(r.id, r.status)} className={`p-4 rounded-3xl border-2 transition-all flex flex-col items-center justify-center gap-1.5 group ${r.status === 'EMPTY' ? 'border-green-500/30 bg-green-500/5 text-green-400' : 'border-red-500/30 bg-red-500/5 text-red-500'}`}>
                                                    <span className="text-2xl font-black tracking-tighter group-active:scale-90 transition-transform">{r.room_no}</span>
                                                    <span className={`text-[10px] font-black py-0.5 px-3 rounded-full ${r.status === 'EMPTY' ? 'bg-green-500 text-white' : 'bg-red-500 text-slate-200'}`}>
                                                        {r.status === 'EMPTY' ? '빈 방' : '사용중'}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="p-6 space-y-4">
                                        {capacityWaiting.length === 0 ? (
                                            <div className="py-20 flex items-center justify-center text-slate-600 font-black tracking-widest text-lg opacity-50">대기 중인 손님이 없습니다</div>
                                        ) : (
                                            capacityWaiting.map((w, index) => {
                                                const globalIndex = waitingList.findIndex(x => x.id === w.id);
                                                return (
                                                    <div key={w.id} className="bg-slate-950 border border-slate-800 rounded-3xl p-5 flex flex-col gap-5 hover:border-blue-500/30 transition-colors">
                                                        <div className="flex justify-between items-start">
                                                            <div className="flex gap-4 items-center">
                                                                <span className="text-4xl text-blue-500 font-black italic">#{index + 1}</span>
                                                                <div className="flex items-baseline gap-4 ml-1">
                                                                    <span className="text-2xl font-black text-white">{w.name}</span>
                                                                    <span className="text-xl text-blue-300 font-mono font-black tracking-widest">{w.phone.replace(/[^0-9]/g, '').replace(/^(\d{2,3})(\d{3,4})(\d{4})$/, '$1-$2-$3')}</span>
                                                                </div>
                                                            </div>
                                                            <span className="text-[10px] text-slate-500 font-bold bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-lg tracking-widest">전체 {globalIndex + 1}번</span>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => cancel(w.id)} className="flex-1 py-4 bg-slate-800 hover:bg-red-600 text-slate-400 hover:text-white rounded-2xl font-black text-sm active:scale-95 transition-all">예약취소</button>
                                                            <button onClick={() => complete(w.id)} className="flex-1 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-sm shadow-lg shadow-blue-600/20 active:scale-95 transition-all">입실완료</button>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </section>
                            );
                        })}
                    </div>
                </main>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
