<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meca PC - Waiting System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #020617;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* 태블릿 스크롤 방지 */
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .input-field {
            background-color: #0f172a;
            border: 1.5px solid #1e293b;
            color: white;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: #3b82f6;
            background-color: #020617;
        }

        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .mode-switcher {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 10px;
            z-index: 1000;
            cursor: pointer;
        }

        /* 주의문구 스타일 - 텍스트 크기 한 단계 축소 적용 */
        .notice-container {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-left: 6px solid #ef4444;
            padding: 1.25rem;
            /* 여백 소폭 조정 */
            border-radius: 1.25rem;
        }

        .notice-text {
            font-size: 0.95rem;
            /* 1.05rem에서 한 단계 축소 */
            line-height: 1.6;
            font-weight: 600;
            word-break: keep-all;
        }

        /* 태블릿 높이 최적화 컨테이너 */
        .tablet-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem 1.5rem;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const SUPABASE_URL = 'https://sslxmhgpygsjisuxqmjb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fb7TduQr58DH6C1n7WNlIw_OrH-sbZV';
        const params = new URLSearchParams(window.location.search);
        const CURRENT_STORE_ID = params.get('store') || 'bukdae1';

        const App = () => {
            const [view, setView] = useState('USER');
            const [supabase, setSupabase] = useState(null);
            const [rooms, setRooms] = useState([]);
            const [waitingList, setWaitingList] = useState([]);
            const [step, setStep] = useState('STATUS');
            const [formData, setFormData] = useState({ name: '', phone: '', size: '4' });
            const [myTicket, setMyTicket] = useState(null);

            useEffect(() => {
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                setSupabase(client);
            }, []);

            useEffect(() => {
                let timer;
                if (step === 'COMPLETE') {
                    timer = setTimeout(() => {
                        setStep('STATUS');
                        setMyTicket(null);
                        setFormData({ name: '', phone: '', size: '4' });
                    }, 15000);
                }
                return () => clearTimeout(timer);
            }, [step]);

            useEffect(() => {
                if (!supabase) return;
                const fetchData = async () => {
                    const { data: r } = await supabase.from('rooms').select('*').eq('store_id', CURRENT_STORE_ID).order('room_no', { ascending: true });
                    const { data: w } = await supabase.from('waiting').select('*').eq('store_id', CURRENT_STORE_ID).eq('status', 'WAITING').order('created_at', { ascending: true });
                    setRooms(r || []);
                    setWaitingList(w || []);
                };
                fetchData();
                const channel = supabase.channel('realtime-sync').on('postgres_changes', { event: '*', schema: 'public', table: '*' }, fetchData).subscribe();
                return () => supabase.removeChannel(channel);
            }, [supabase]);

            const handleRegister = async () => {
                if (!formData.name || !formData.phone) {
                    alert('성함과 연락처를 모두 입력해 주세요.');
                    return;
                }
                const phoneNumbersOnly = formData.phone.replace(/[^0-9]/g, '');
                if (phoneNumbersOnly.length !== 11) {
                    alert('연락처는 11자리 숫자로 정확히 입력해 주세요.');
                    return;
                }
                const { data, error } = await supabase.from('waiting').insert([{
                    name: formData.name, phone: formData.phone, party_size: parseInt(formData.size), store_id: CURRENT_STORE_ID
                }]).select();
                if (!error && data) {
                    setMyTicket(data[0]);
                    setStep('COMPLETE');
                }
            };

            const resetToStatus = () => {
                setStep('STATUS');
                setMyTicket(null);
                setFormData({ name: '', phone: '', size: '4' });
            };

            return (
                <div className="bg-slate-950">
                    <div onClick={() => setView(view === 'USER' ? 'ADMIN' : 'USER')} className="mode-switcher"></div>

                    {view === 'USER' ? (
                        <div className="mx-auto relative border-x-4 border-dashed border-yellow-500/30 bg-slate-900/20" style={{ width: '100%', maxWidth: 'calc(100vh * (1600 / 2560))' }}>
                            {step === 'STATUS' && (() => {
                                const capacities = [...new Set(rooms.map(r => r.capacity))].sort((a, b) => a - b);
                                return (
                                <div className="tablet-screen fade-in">
                                    <header className="text-center mb-6">
                                        <h1 className="text-6xl font-[900] text-white italic tracking-tighter">Meca PC</h1>
                                        <p className="text-sm text-blue-400 font-black tracking-widest mt-3">룸 현황 / 웨이팅 예약</p>
                                    </header>

                                    <div className="flex-1 flex flex-col justify-center">
                                        <div className={capacities.length >= 4 ? "space-y-1.5" : "space-y-2"}>
                                            {(() => {
                                                const getRoomName = (c) => c === 2 ? '커플룸' : `${c}인실`;
                                                return capacities.map(cap => {
                                                    const availCount = rooms.filter(r => r.capacity === cap && r.status === 'EMPTY').length;
                                                    const waitCount = waitingList.filter(w => w.party_size === cap).length;
                                                    const isCompact = capacities.length >= 4;
                                                    return (
                                                        <div key={cap} className={`glass-card ${isCompact ? 'py-4' : 'py-5'} px-8 rounded-[2.5rem] flex justify-between items-center`}>
                                                            <div className="flex items-end gap-2">
                                                                <span className={`${isCompact ? 'text-2xl' : 'text-3xl'} font-black text-white italic`}>{getRoomName(cap)}</span>
                                                                {cap === 2 && <span className="text-xs font-bold text-slate-400 mb-0.5 ml-1">(2인실)</span>}
                                                            </div>
                                                            <div className="flex items-center gap-8">
                                                                <div className="flex flex-col items-center min-w-[3.5rem]">
                                                                    <span className="text-[10px] text-slate-400 font-black tracking-widest mb-0.5">빈 방</span>
                                                                    <span className={`${isCompact ? 'text-3xl' : 'text-4xl'} font-black text-blue-500 italic`}>
                                                                        {availCount}
                                                                    </span>
                                                                </div>
                                                                <div className="w-[1.5px] h-10 bg-white/10"></div>
                                                                <div className="flex flex-col items-center min-w-[3.5rem]">
                                                                    <span className="text-[10px] text-slate-400 font-black tracking-widest mb-0.5">대기 팀</span>
                                                                    <span className={`${isCompact ? 'text-3xl' : 'text-4xl'} font-black italic ${waitCount > 0 ? 'text-rose-500' : 'text-slate-600'}`}>
                                                                        {waitCount}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                });
                                            })()}
                                        </div>
                                    </div>

                                    <div className="w-full mt-2">
                                        <div className="bg-slate-800/60 border border-slate-700/50 rounded-3xl p-4 text-center mb-3">
                                            <p className="text-[15px] text-slate-200 font-bold mb-1 break-keep">원하는 룸 타입에 빈 방이 있을 경우,<br />카운터에 문의하시면 바로 입실을 도와 드리겠습니다.</p>
                                            <p className="text-[15px] text-slate-400 font-medium break-keep">빈 방이 없을 경우에는 웨이팅 예약을 하시면,<br />빈 방이 생겼을 때 연락을 드리겠습니다.</p>
                                        </div>
                                        <button onClick={() => setStep('REGISTER')} className="btn-primary w-full text-white text-xl font-black py-6 rounded-[2.5rem]">
                                            웨이팅 예약
                                        </button>
                                    </div>
                                </div>
                            )})()}

                            {step === 'REGISTER' && (
                                <div className="tablet-screen fade-in">
                                    <header className="flex items-center gap-4">
                                        <button onClick={() => setStep('STATUS')} className="w-12 h-12 flex items-center justify-center bg-slate-900 rounded-2xl border border-white/5">
                                            <svg className="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                                        </button>
                                        <h2 className="text-3xl font-[900] text-white italic tracking-tighter">RESERVATION</h2>
                                    </header>

                                    <div className="notice-container my-4">
                                        <p className="text-red-500 font-black text-base italic tracking-tighter mb-2">⚠️ 반드시 확인해 주세요</p>
                                        <div className="notice-text text-slate-200">
                                            <p className="mb-1.5">• 예약하실 때 <span className="text-white underline decoration-blue-500 decoration-1">시간 지정은 불가능하며</span>, 예약하신 순서대로 입장을 도와드리고 있습니다.</p>
                                            <p className="mb-1.5">• <span className="text-white underline decoration-blue-500 decoration-1">모든 일행분이 같이 계셔야</span> 입장이 가능합니다.</p>
                                            <p className="mb-1.5 text-red-300">• 전화를 받지 않으시거나 번호가 틀린 경우, 다음 예약하신 분께 차례가 넘어갑니다.</p>
                                            <p>• 연락을 드린 후, <span className="text-red-400 underline decoration-red-500 decoration-1 font-black italic">5분 이내에 카운터에 도착하지 않으시면</span> 예약이 취소됩니다.</p>
                                        </div>
                                    </div>

                                    <div className="flex-1 space-y-6">
                                        <div className="space-y-3">
                                            <label className="text-sm font-black text-slate-500 tracking-widest ml-2">룸 타입 선택</label>
                                            {(() => {
                                                const capacities = [...new Set(rooms.map(r => r.capacity))].sort((a, b) => a - b);
                                                const getRoomName = (c) => c === 2 ? '커플룸' : `${c}인실`;
                                                const getLabel = (c) => {
                                                    if (c === 2) return '2인만 입장 가능';
                                                    if (c === 3) return '3인만 입장 가능';
                                                    return `${c-1}인 이상 입장 가능`;
                                                };
                                                
                                                return (
                                                    <div className={`grid gap-3 ${capacities.length >= 4 ? 'grid-cols-2 lg:grid-cols-4' : 'grid-cols-3'}`}>
                                                        {capacities.map(cap => (
                                                            <button key={cap} onClick={() => setFormData({ ...formData, size: cap.toString() })} className={`py-3 flex flex-col items-center justify-center rounded-[1.8rem] border-2 transition-all ${formData.size === cap.toString() ? 'bg-blue-600 border-blue-400 text-white shadow-xl' : 'bg-slate-900 border-transparent text-slate-500'}`}>
                                                                <span className="font-black text-xl mb-0.5">{getRoomName(cap)}</span>
                                                                <span className={`text-[11px] font-bold tracking-tight ${formData.size === cap.toString() ? 'text-blue-200' : 'text-slate-600'}`}>{getLabel(cap)}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                        <div className="space-y-4">
                                            <div className="space-y-2">
                                                <label className="text-sm font-black text-slate-500 tracking-widest ml-2">이름</label>
                                                <input type="text" placeholder="이름을 입력해 주세요" className="input-field w-full py-5 px-7 rounded-[1.8rem] font-bold text-lg" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-black text-slate-500 tracking-widest ml-2 flex items-center gap-2">
                                                    연락처
                                                    <span className="text-xs font-bold text-slate-500 tracking-normal">(11자리 숫자만 입력해주세요.)</span>
                                                </label>
                                                <input type="tel" placeholder="010-1234-5678" className="input-field w-full py-5 px-7 rounded-[1.8rem] font-bold text-lg" value={formData.phone} onChange={e => {
                                                    const raw = e.target.value.replace(/[^0-9]/g, '');
                                                    let formatted = raw;
                                                    if (raw.length > 3 && raw.length <= 7) formatted = raw.slice(0, 3) + '-' + raw.slice(3);
                                                    else if (raw.length > 7) formatted = raw.slice(0, 3) + '-' + raw.slice(3, 7) + '-' + raw.slice(7, 11);
                                                    setFormData({ ...formData, phone: formatted });
                                                }} />
                                            </div>
                                        </div>
                                    </div>

                                    <button onClick={handleRegister} className="btn-primary w-full text-white text-xl font-black py-7 rounded-[2.5rem] mt-4">예약 완료하기</button>
                                </div>
                            )}

                            {step === 'COMPLETE' && (
                                <div className="tablet-screen fade-in justify-center text-center">
                                    <div className="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl">
                                        <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7"></path></svg>
                                    </div>
                                    <h2 className="text-4xl font-[900] text-white italic tracking-tighter mb-4 uppercase">예약 완료</h2>
                                    <div className="glass-card py-16 rounded-[4rem] relative overflow-hidden">
                                        <p className="text-lg font-black text-blue-500 tracking-widest mb-6 italic">대기 순번</p>
                                        <div className="text-9xl font-[900] text-white italic tracking-tighter">
                                            {myTicket ? (() => {
                                                const sameSizeList = waitingList.filter(w => w.party_size === myTicket.party_size);
                                                const idx = sameSizeList.findIndex(w => w.id === myTicket.id);
                                                return idx !== -1 ? idx + 1 : sameSizeList.length + 1;
                                            })() : '-'}
                                        </div>
                                    </div>
                                    <p className="text-xl text-slate-400 font-bold mt-10 italic tracking-wide">잠시 후 화면이 자동 전환됩니다.</p>
                                    <button onClick={resetToStatus} className="mt-8 mx-auto px-12 py-5 bg-slate-800 hover:bg-slate-700 text-white rounded-[2rem] font-black text-xl border border-slate-700 transition-colors shadow-xl">
                                        처음 화면으로 돌아가기
                                    </button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="p-10 text-white font-black italic">ADMIN VIEW (탭 전환 시에만 노출)</div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
